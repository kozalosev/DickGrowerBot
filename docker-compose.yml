services:
  DickGrowerBot:
    build: .
    image: kozalosev/dickgrowerbot
    container_name: dickgrowerbot
    restart: unless-stopped
    environment:
      - TELOXIDE_TOKEN
      - RUST_LOG
      - WEBHOOK_URL
      - DATABASE_URL=postgres://${POSTGRES_USER:?error}:${POSTGRES_PASSWORD:?error}@${POSTGRES_HOST:?error}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:?error}
      - DATABASE_MAX_CONNECTIONS
      - HELP_ADMIN_CHANNEL_RU
      - HELP_ADMIN_CHANNEL_EN
      - HELP_ADMIN_CHAT_RU
      - HELP_ADMIN_CHAT_EN
      - HELP_GIT_REPO
      - CHATS_MERGING_ENABLED
      - TOP_UNLIMITED_ENABLED
      - MULTIPLE_LOANS_ENABLED
      - PVP_DEFAULT_BET
      - PVP_CHECK_ACCEPTOR_LENGTH
      - PVP_CALLBACK_LOCKS_ENABLED
      - PVP_STATS_SHOW
      - PVP_STATS_SHOW_NOTICE
      - GROWTH_MIN
      - GROWTH_MAX
      - GROW_SHRINK_RATIO
      - GROWTH_DOD_BONUS_MAX
      - NEWCOMERS_GRACE_DAYS
      - TOP_LIMIT
      - INACTIVITY_DAYS
      - HELP_PUSSIES_COEF
      - LOAN_PAYOUT_COEF
      - DOD_SELECTION_MODE
      - DOD_RICH_EXCLUSION_RATIO
      - ANNOUNCEMENTS_FILE
      - GRPC_ADDR_USER_SERVICE
      - USER_CACHE_TIME_SECS
      - USER_SERVICE_TIMEOUT_SECS
      - CHAT_LANGUAGE_CACHE_TIME_SECS
      - MSG_SELFDESTRUCT_DELAY_NOTICE
      - MSG_SELFDESTRUCT_DELAY_REPORT
      - MSG_SELFDESTRUCT_READING_SPEED_CPM
      - MSG_SELFDESTRUCT_WARNING_SECONDS
    expose:
      - 8080
    volumes:
      - ./announcements.yml:/announcements.yml:ro
    networks:
      - postgres-network
      - user-service-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: local
    depends_on:
      - postgres
  postgres:
    image: postgres:14.5-alpine
    container_name: dickgrowerbot-postgresql
    environment:
      - POSTGRES_PORT
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - PGDATA=/var/lib/postgresql/data/pgdata
      # Consumed by the init script below to provision the user-service's own database
      # on this same server (only on a fresh data volume).
      - USER_SERVICE_POSTGRES_DB
      - USER_SERVICE_POSTGRES_USER
      - USER_SERVICE_POSTGRES_PASSWORD
    expose:
      - ${POSTGRES_PORT}
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./postgres/init-user-service-db.sh:/docker-entrypoint-initdb.d/init-user-service-db.sh:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - postgres-network
    logging:
      driver: local
  # Optional user-service integration (personal /language, cross-bot user languages).
  # The bot reaches it over gRPC at user-service:8090; enable by setting
  # GRPC_ADDR_USER_SERVICE=user-service:${USER_SERVICE_GRCP_PORT} in .env. It shares
  # the `postgres` server above but uses its own database (provisioned by
  # postgres/init-user-service-db.sh).
  user-service:
    image: ghcr.io/kozalo-blog/user-service
    container_name: dickgrowerbot-user-service
    restart: unless-stopped
    environment:
      - RUST_LOG
      - DATABASE_URL=postgres://${USER_SERVICE_POSTGRES_USER:?error}:${USER_SERVICE_POSTGRES_PASSWORD:?error}@postgres:5432/${USER_SERVICE_POSTGRES_DB:?error}
    expose:
      - ${USER_SERVICE_GRPC_PORT}
    networks:
      - postgres-network
      - user-service-network
    logging:
      driver: local
    depends_on:
      - postgres
networks:
  postgres-network:
    driver: bridge
  user-service-network:
    driver: bridge